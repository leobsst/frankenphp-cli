; Production-only PHP overrides
; This file is mounted as a conf.d file in production and overrides base php.ini settings.

[PHP]
; Hide PHP version from response headers
expose_php = Off

; Enable output buffering for better performance
output_buffering = 4096

; Enable OPCache for production performance
[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 24
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
