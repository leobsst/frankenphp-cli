name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: frankenmanager-linux-x86_64
          - os: macos-latest
            artifact_name: frankenmanager-macos-arm64
          # - os: macos-15-large
          #   artifact_name: frankenmanager-macos-x86_64
          # - os: windows-latest
          #   artifact_name: frankenmanager-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history and tags for version detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch-vcs  # Required for version detection
          pip install -e .
          pip install pyinstaller

      - name: Warn about missing Apple signing secrets
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 == ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          echo "::warning::macOS binary will NOT be signed or notarized. Users will need to manually allow it in System Settings."
          echo ""
          echo "To enable code signing, add the following secrets in Settings > Secrets and variables > Actions:"
          echo ""
          echo "1. APPLE_CERTIFICATE_BASE64"
          echo "   - Open Keychain Access, export your 'Developer ID Application' certificate as .p12"
          echo "   - Encode it: base64 -i YourCertificate.p12 | pbcopy"
          echo "   - Paste the result as the secret value"
          echo ""
          echo "2. APPLE_CERTIFICATE_PASSWORD"
          echo "   - The password you chose when exporting the .p12 file"
          echo ""
          echo "3. APPLE_NOTARY_CREDENTIALS"
          echo '   - A JSON object: {"apple_id": "your@email.com", "team_id": "XXXXXXXXXX", "app_specific_password": "xxxx-xxxx-xxxx-xxxx"}'
          echo "   - Generate an app-specific password at https://appleid.apple.com/account/manage"
          echo "   - Find your Team ID at https://developer.apple.com/account#MembershipDetailsCard"

      - name: Setup macOS code signing keychain
        id: macos-keychain
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Find signing identity and export for next steps
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with identity: $IDENTITY"
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "keychain_password=$KEYCHAIN_PASSWORD" >> $GITHUB_OUTPUT

      - name: Build binary (macOS signed)
        if: runner.os == 'macOS' && steps.macos-keychain.outputs.identity != ''
        env:
          CODESIGN_IDENTITY: ${{ steps.macos-keychain.outputs.identity }}
          ENTITLEMENTS_FILE: entitlements.plist
        run: python scripts/build.py --clean --release

      - name: Build binary (unsigned)
        if: runner.os != 'macOS' || steps.macos-keychain.outputs.identity == ''
        run: python scripts/build.py --clean --release

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && steps.macos-keychain.outputs.identity != ''
        env:
          APPLE_NOTARY_CREDENTIALS: ${{ secrets.APPLE_NOTARY_CREDENTIALS }}
        run: |
          BINARY_PATH=$(ls dist/frankenmanager-*)

          # Verify signature
          codesign --verify --verbose "$BINARY_PATH"
          echo "Binary signature verified"

          # Parse notary credentials
          APPLE_ID=$(echo "$APPLE_NOTARY_CREDENTIALS" | python3 -c "import sys,json; print(json.load(sys.stdin)['apple_id'])")
          TEAM_ID=$(echo "$APPLE_NOTARY_CREDENTIALS" | python3 -c "import sys,json; print(json.load(sys.stdin)['team_id'])")
          APP_PASSWORD=$(echo "$APPLE_NOTARY_CREDENTIALS" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_specific_password'])")

          # Create zip for notarization
          ZIP_PATH=$RUNNER_TEMP/frankenmanager.zip
          ditto -c -k --keepParent "$BINARY_PATH" "$ZIP_PATH"

          # Submit for notarization and wait
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait --timeout 10m

          echo "macOS binary signed and notarized successfully"

      - name: Cleanup macOS keychain
        if: always() && steps.macos-keychain.outputs.keychain_path != ''
        run: security delete-keychain "${{ steps.macos-keychain.outputs.keychain_path }}"

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/frankenmanager-*
          ./dist/frankenmanager-* --version
          ./dist/frankenmanager-* --help

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: |
          dist\frankenmanager-*.exe --version
          dist\frankenmanager-*.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/frankenmanager-*
          if-no-files-found: error

  build-python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history and tags for version detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatch-vcs

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-python-package]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy binaries
          cp artifacts/frankenmanager-linux-x86_64/* release-assets/ || true
          cp artifacts/frankenmanager-macos-arm64/* release-assets/ || true
          cp artifacts/frankenmanager-macos-x86_64/* release-assets/ || true
          cp artifacts/frankenmanager-windows-x86_64.exe/* release-assets/ || true

          # Copy Python packages
          cp artifacts/python-package/* release-assets/ || true

          # Make Unix binaries executable
          chmod +x release-assets/frankenmanager-linux-* release-assets/frankenmanager-macos-* 2>/dev/null || true

          # List all assets
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Extract CHANGELOG for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo "Extracting changelog for version $VERSION"

            # Use awk to extract content between version headers
            CHANGELOG_CONTENT=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '$d' | tail -n +2)

            # Check if we extracted anything meaningful
            if [ -n "$CHANGELOG_CONTENT" ]; then
              # Save to file for use in release body
              echo "$CHANGELOG_CONTENT" > changelog_extract.md
              echo "has_content=true" >> $GITHUB_OUTPUT
            else
              echo "No content found for version $VERSION in CHANGELOG.md"
              echo "has_content=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "CHANGELOG.md not found"
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release body
        run: |
          cat > release_body.md << 'EOF'
          ## What's Changed

          EOF

          # Add changelog content if available
          if [ -f changelog_extract.md ] && [ "${{ steps.changelog.outputs.has_content }}" == "true" ]; then
            cat changelog_extract.md >> release_body.md
            echo "" >> release_body.md
          else
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes." >> release_body.md
            echo "" >> release_body.md
          fi

          cat >> release_body.md << 'EOF'

          ## Installation

          ### Pre-built Binaries (Recommended)

          Download the appropriate binary for your platform:

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | macOS | Apple Silicon | `frankenmanager-macos-arm64` |
          | macOS | Intel | `frankenmanager-macos-x86_64` |
          | Linux | x86_64 | `frankenmanager-linux-x86_64` |
          | Windows | x86_64 | `frankenmanager-windows-x86_64.exe` |

          #### Quick Install (macOS/Linux)

          ```bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/install.sh | bash
          ```

          Or pin to this specific version:

          ```bash
          VERSION=${{ steps.version.outputs.version }} curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/install.sh | bash
          ```

          ### Python Package (pip)

          ```bash
          pip install frankenmanager
          # or
          pipx install frankenmanager
          ```

          ## First-time Setup

          After installation, run the setup command to configure passwordless privilege escalation and install dependencies:

          ```bash
          sudo frankenmanager setup --install-mkcert
          ```

          This will:
          - Configure passwordless `/etc/hosts` modifications
          - Install mkcert for SSL certificate generation

          ## Verify Installation

          ```bash
          frankenmanager --version
          frankenmanager setup --status
          ```
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: FrankenManager v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          files: |
            release-assets/*
          body_path: release_body.md

