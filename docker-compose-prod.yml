services:
  db:
    container_name: mariadb
    image: mariadb:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${PWD}/database:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: TS2DHFaAfENQ

  franken-php:
    container_name: webserver-and-caddy
    image: custom-frankenphp:latest
    restart: unless-stopped
    network_mode: host
    user: 1001:1001
    volumes:
      - ${CUSTOM_PATH}:/${CUSTOM_PATH}
      - ${PWD}/caddy/data:/data
      - ${PWD}/caddy/config:/config
      - ${PWD}/caddy/certs:/certs
      - /etc/letsecnrypt:/etc/letsencrypt
      - ${PWD}/caddy/log:/var/log
      - ${PWD}/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${PWD}/php/php.ini:/usr/local/etc/php/php.ini