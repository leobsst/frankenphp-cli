repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - typer>=0.9.0
          - rich>=13.0.0
          - docker>=7.0.0
          - python-dotenv>=1.0.0
        pass_filenames: false
        entry: mypy src/
