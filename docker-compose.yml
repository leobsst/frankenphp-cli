services:
  db:
    container_name: mariadb
    image: mariadb:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${PWD}/database:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: TS2DHFaAfENQ

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: 192.168.1.72
      PMA_USER: root
      PMA_PASSWORD: TS2DHFaAfENQ
    ports:
      - 8080:80

  franken-php:
    container_name: webserver-and-caddy
    image: custom-frankenphp:latest
    restart: unless-stopped
    network_mode: host
    user: 501:20
    ## DISABLED WHEN NET = HOST
    # ports:
    #   - "80:80"
    #   - "443:443"
    #   - "443:443/udp"
    volumes:
      - ${CUSTOM_PATH}/api-mediprix:/${CUSTOM_PATH}/api-mediprix
      - ${CUSTOM_PATH}/mediprix-v2:/${CUSTOM_PATH}/mediprix-v2
      - ${CUSTOM_PATH}/fluxdeflammes:/${CUSTOM_PATH}/fluxdeflammes
      - ${PWD}/caddy/data:/data
      - ${PWD}/caddy/config:/config
      - ${PWD}/caddy/certs:/certs
      - ${PWD}/caddy/log:/var/log
      - ${PWD}/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${PWD}/php/php.ini:/usr/local/etc/php/php.ini